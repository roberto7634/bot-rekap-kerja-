name: Jalankan Bot Rekap

on:
  schedule:
    - cron: '0 1 * * *'   # 08:00 WIB
    - cron: '0 10 * * *'  # 17:00 WIB
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI schedule pandas openpyxl
    
    - name: Cek token
      run: |
        if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ]; then
          echo "❌ Token tidak ditemukan di secrets!"
          exit 1
        else
          echo "✅ Token tersedia"
        fi
    
    - name: Jalankan Bot
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: |
        echo "Menjalankan bot..."
        python bot.py
        echo "Selesai"
