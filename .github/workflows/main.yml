name: Jalankan Bot Rekap

on:
  schedule:
    # Format cron: menit jam hari-tanggal bulan hari-minggu
    # UTC (WIB = UTC+7)
    - cron: '0 1 * * *'   # 08:00 WIB - Pengingat absen
    - cron: '0 10 * * *'  # 17:00 WIB - Rekap harian
  
  workflow_dispatch:  # Bisa dijalankan manual juga

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI
    
    - name: Cek Token
      run: |
        if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ]; then
          echo "❌ ERROR: Token tidak ditemukan di Secrets!"
          exit 1
        else
          echo "✅ Token tersedia"
        fi
    
    - name: Jalankan Bot
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: |
        echo "🚀 Menjalankan bot..."
        python bot.py
        echo "✅ Selesai"
